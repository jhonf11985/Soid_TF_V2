{% extends "errors/error_base.html" %}

{% block title %}Página no encontrada | SOID{% endblock %}

{% block error_content %}
<div class="error-card__header">
    <span class="error-badge">
        <span class="material-icons" style="font-size:18px;">search_off</span>
        Error 404
    </span>
</div>

<div class="error-card__body">
    <div class="error-icon-wrap">
        <span class="material-icons error-icon">travel_explore</span>
    </div>

    <h1 class="error-title">Página no encontrada</h1>

    <p class="error-text">
        La dirección que intentas abrir no existe, fue movida o ya no está disponible.
    </p>

    <div class="error-actions">
        <a href="/" class="error-btn error-btn--primary">
            <span class="material-icons">home</span>
            Ir al inicio
        </a>

        <button type="button" class="error-btn error-btn--secondary" onclick="history.back()">
            <span class="material-icons">arrow_back</span>
            Volver atrás
        </button>
    </div>
</div>
{% endblock %}
