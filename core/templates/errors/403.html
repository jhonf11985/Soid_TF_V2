{% extends "errors/error_base.html" %}

{% block title %}Acceso denegado | SOID{% endblock %}

{% block error_content %}
<div class="error-card__header">
    <span class="error-badge">
        <span class="material-icons" style="font-size:18px;">gpp_bad</span>
        Error 403
    </span>
</div>

<div class="error-card__body">
    <div class="error-icon-wrap">
        <span class="material-icons error-icon">lock</span>
    </div>

    <h1 class="error-title">Acceso denegado</h1>

    <p class="error-text">
        No tienes permisos suficientes para acceder a esta sección del sistema.
    </p>

    <div class="error-actions">
        <a href="/" class="error-btn error-btn--primary">
            <span class="material-icons">home</span>
            Ir al inicio
        </a>

        <button type="button" class="error-btn error-btn--secondary" onclick="history.back()">
            <span class="material-icons">arrow_back</span>
            Volver atrás
        </button>
    </div>
</div>
{% endblock %}
