<div class="soid-assistant" id="soidAssistant">
  <div class="soid-assistant__card">
    <div class="soid-assistant__title">
      <span class="material-icons">smart_toy</span>
      <div>
        <div class="soid-assistant__h">Asistente</div>
        <div class="soid-assistant__sub">Escribe algo como: “búscame los últimos miembros registrados”.</div>
      </div>
    </div>

    <div class="soid-assistant__input">
      <input
        type="text"
        id="soidAssistantInput"
        placeholder="Ej: muéstrame los últimos 10 miembros..."
        autocomplete="off"
      />
      <button type="button" id="soidAssistantBtn">
        <span class="material-icons">search</span>
      </button>
    </div>

    <div class="soid-assistant__status" id="soidAssistantStatus" aria-live="polite"></div>

    <div class="soid-assistant__results" id="soidAssistantResults"></div>

    <div class="soid-assistant__chips">
      <button type="button" class="soid-chip" data-q="búscame los últimos miembros registrados">Últimos miembros</button>
      <button type="button" class="soid-chip" data-q="registrados hoy">Registrados hoy</button>
      <button type="button" class="soid-chip" data-q="registrados esta semana">Esta semana</button>
      <button type="button" class="soid-chip" data-q="registrados este mes">Este mes</button>
    </div>
  </div>
</div>
